<div class="flex items-center gap-2">
  <button
    (click)="run.emit()"
    [disabled]="flag()"
    class="px-4 py-2 rounded-lg bg-blue-700 text-white disabled:bg-zinc-200"
  >
    เริ่ม
  </button>
  <button
    (click)="reset.emit()"
    [disabled]="flag()"
    class="px-4 py-2 rounded-lg bg-blue-700 text-white disabled:bg-zinc-200"
  >
    รีเซ็ต
  </button>
  <button
    (click)="random.emit()"
    [disabled]="flag()"
    class="px-4 py-2 rounded-lg bg-blue-700 text-white disabled:bg-zinc-200"
  >
    สุ่ม
  </button>
</div>
<div class="flex items-end gap-1 h-52 relative">
  @for (item of array(); track $index) {
  <div
    [style.height]="item * 2 + '%'"
    [style.background-color]="
      'hsl(' +
      (item / array().length) * 270 +
      ', 100%, ' +
      (running()[0] === $index && flag() ? '0' : '50') +
      '%)'
    "
    class="grow"
  ></div>
  }
</div>
